name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # RELEASE_PLEASE_TOKEN should be a PAT with repo scope: PRs opened with
      # the default GITHUB_TOKEN don't trigger CI, so the release PR would sit
      # with no checks and need an admin bypass to merge. Falls back to the
      # default token if the secret isn't configured.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

services:
  app:
    image: ghcr.io/spoo-me/spoo:${IMAGE_TAG:-latest}
    container_name: spoo_app
    restart: always
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --no-access-log
      --timeout-keep-alive 5
      --timeout-graceful-shutdown 30
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 3g
    mem_reservation: 512m
    networks:
      spoonet:
        ipv4_address: 172.30.0.10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  qr:
    image: ghcr.io/spoo-me/qr:${QR_IMAGE_TAG:-latest}
    container_name: spoo_qr
    restart: always
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8080
      --workers 2
      --no-access-log
      --timeout-keep-alive 5
      --timeout-graceful-shutdown 30
    env_file:
      - .env.qr
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.60
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  redis:
    image: redis:7-alpine
    container_name: spoo_redis
    restart: always
    # 512MB cap (out of 8GB box). LRU evicts stale URL entries when full.
    # No persistence — cache is rebuildable from Mongo. RDB/AOF disabled to
    # avoid disk I/O cost. Lose-cache-on-restart is acceptable.
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    mem_limit: 768m
    networks:
      spoonet:
        ipv4_address: 172.30.0.40
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  caddy:
    image: caddy:2-alpine
    container_name: spoo_caddy
    restart: always
    # Caddy terminates TLS for CF orange-cloud requests using a Cloudflare
    # Origin CA certificate (mounted from ./caddy/origin.{crt,key}). UFW on
    # the host (see infrastructure/ufw-cloudflare.sh) restricts inbound 443
    # to CF IP ranges only — so any request reaching Caddy came from CF.
    #
    # Architecturally this replaces cloudflared. CF Tunnel routed all traffic
    # through IAD POPs which has flaky cross-region backbone for some user
    # paths (Jio IPv6 → MRS, Berlin POP for Asia traffic). Direct origin uses
    # CF's standard anycast — no tunnel detour.
    ports:
      - "443:443"
      - "443:443/udp"
      - "80:80"
    environment:
      # Shared with the CF custom-domain Worker; see cloudflare-worker/README.md.
      # `:?` fails compose up if the var is unset/empty — without it, Caddy's
      # auth matcher would expand to an empty string and let any request
      # through with no X-Worker-Auth header.
      - WORKER_AUTH_SECRET=${WORKER_AUTH_SECRET:?WORKER_AUTH_SECRET must be set in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/origin.crt:/etc/caddy/origin.crt:ro
      - ./caddy/origin.key:/etc/caddy/origin.key:ro
      - ./caddy/cf-authenticated-origin-pull.crt:/etc/caddy/cf-authenticated-origin-pull.crt:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
      qr:
        condition: service_healthy
    # Caddy admin API check is the cheapest reliable liveness signal.
    # An https://localhost/health probe fails on SNI (localhost matches no
    # host block); an external probe through Cloudflare loops back through
    # the host network. Admin API on 127.0.0.1:2019 proves the daemon is
    # accepting config — that's the failure mode we actually want to catch.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--tries=1", "--timeout=3", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    mem_reservation: 64m
    networks:
      spoonet:
        ipv4_address: 172.30.0.20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: spoo_redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    # No healthcheck: the redis_exporter image is built FROM scratch (Go binary
    # only — no shell, wget, curl, or nc). Docker compose has no built-in HTTP
    # probe (that's a k8s feature). Process auto-restarts on crash via
    # restart: always; in 14h+ uptime we've never seen this image deadlock.
    mem_limit: 64m
    networks:
      spoonet:
        ipv4_address: 172.30.0.50
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "2"

  vector:
    image: timberio/vector:0.43.0-alpine
    container_name: spoo_vector
    restart: always
    command: ["--config-toml", "/etc/vector/vector.toml"]
    environment:
      - AXIOM_TOKEN=${AXIOM_TOKEN}
      - AXIOM_DATASET=${AXIOM_DATASET:-spoo-prod}
      - AXIOM_METRICS_DATASET=${AXIOM_METRICS_DATASET:-spoo-metrics}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    depends_on:
      - redis-exporter
    healthcheck:
      # Vector's API server (enabled in vector.toml [api]) exposes /health on
      # 127.0.0.1:8686. Catches deadlocks where process is up but pipeline is
      # stuck — restart: always alone can't see this.
      test: ["CMD", "wget", "-qO-", "--tries=1", "--timeout=3", "http://127.0.0.1:8686/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.30
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  spoonet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

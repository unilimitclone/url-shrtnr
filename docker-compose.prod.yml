services:
  app:
    image: ghcr.io/spoo-me/spoo:${IMAGE_TAG:-latest}
    container_name: spoo_app
    restart: always
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --no-access-log
      --timeout-keep-alive 5
      --timeout-graceful-shutdown 30
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 3g
    mem_reservation: 512m
    networks:
      spoonet:
        ipv4_address: 172.30.0.10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  qr:
    image: ghcr.io/spoo-me/qr:${QR_IMAGE_TAG:-latest}
    container_name: spoo_qr
    restart: always
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8080
      --workers 2
      --no-access-log
      --timeout-keep-alive 5
      --timeout-graceful-shutdown 30
    env_file:
      - .env.qr
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.60
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  redis:
    image: redis:7-alpine
    container_name: spoo_redis
    restart: always
    # 512MB cap (out of 8GB box). LRU evicts stale URL entries when full.
    # No persistence — cache is rebuildable from Mongo. RDB/AOF disabled to
    # avoid disk I/O cost. Lose-cache-on-restart is acceptable.
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    mem_limit: 768m
    networks:
      spoonet:
        ipv4_address: 172.30.0.40
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: spoo_tunnel
    restart: always
    # http2 is more stable than QUIC across CF backbone for cross-region traffic.
    # SIN/BOM POPs sometimes fail to route to IAD origin via QUIC.
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.20
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        tag: "{{.Name}}"

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: spoo_redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 64m
    networks:
      spoonet:
        ipv4_address: 172.30.0.50
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "2"

  vector:
    image: timberio/vector:0.43.0-alpine
    container_name: spoo_vector
    restart: always
    command: ["--config-toml", "/etc/vector/vector.toml"]
    environment:
      - AXIOM_TOKEN=${AXIOM_TOKEN}
      - AXIOM_DATASET=${AXIOM_DATASET:-spoo-prod}
      - AXIOM_METRICS_DATASET=${AXIOM_METRICS_DATASET:-spoo-metrics}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    depends_on:
      - redis-exporter
    mem_limit: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.30
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis-data:

networks:
  spoonet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

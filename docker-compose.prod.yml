services:
  app:
    image: ghcr.io/spoo-me/spoo:${IMAGE_TAG:-latest}
    container_name: spoo_app
    restart: always
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --no-access-log
      --timeout-keep-alive 5
      --timeout-graceful-shutdown 30
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 3g
    mem_reservation: 512m
    networks:
      spoonet:
        ipv4_address: 172.30.0.10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: spoo_tunnel
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.20
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        tag: "{{.Name}}"

  vector:
    image: timberio/vector:0.43.0-alpine
    container_name: spoo_vector
    restart: always
    command: ["--config-toml", "/etc/vector/vector.toml"]
    environment:
      - AXIOM_TOKEN=${AXIOM_TOKEN}
      - AXIOM_DATASET=${AXIOM_DATASET:-spoo-prod}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    mem_limit: 128m
    networks:
      spoonet:
        ipv4_address: 172.30.0.30
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  spoonet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

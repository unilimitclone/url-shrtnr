# Vector config: tail docker container logs → ship to Axiom

[sources.docker]
type = "docker_logs"
include_containers = ["spoo_app", "spoo_tunnel"]
exclude_containers = ["spoo_vector"]

# Parse spoo_app's structlog JSON. Lift inner fields up.
[transforms.parse_json]
type = "remap"
inputs = ["docker"]
source = '''
if .container_name == "spoo_app" {
    parsed, err = parse_json(.message)
    if err == null {
        . = merge!(., parsed)
        del(.message)
    }
}
.service = .container_name
'''

# Drop /health pings (UptimeRobot every 5min) to cut volume.
[transforms.drop_health]
type = "filter"
inputs = ["parse_json"]
condition = '''
!(exists(.http_path) && .http_path == "/health")
'''

[sinks.axiom]
type = "axiom"
inputs = ["drop_health"]
token = "${AXIOM_TOKEN}"
dataset = "${AXIOM_DATASET}"

[sinks.axiom.healthcheck]
enabled = true
